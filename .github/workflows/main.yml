name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Unzip project
        run: unzip AzeTTSApp_FreeTTS.zip

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x AzeTTSApp/gradlew

      - name: Build APK
        run: |
          cd AzeTTSApp
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: AzeTTS-debug
          path: AzeTTSApp/app/build/outputs/apk/debug/app-debug.apk
